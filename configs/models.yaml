# StoryWeaver Engine — Model Configuration
# All models assumed to be served via llama.cpp --server (OpenAI-compatible API)

llm:
  base_url: "http://localhost:8080/v1"
  api_key: "not-needed"       # llama.cpp doesn't require an API key

  # Model assignment per task
  # Point these at whatever GGUF model you have loaded
  models:
    extraction_heavy: "Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf"
    extraction_fast: "Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf"
    agent_narration: "Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf"
    agent_decision: "Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf"
    author_ghost: "Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf"
    parser_fallback: "Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf"

  # Generation params (per task type)
  params:
    extraction:
      temperature: 0.1          # Low temp for structured JSON output
      max_tokens: 1024
      repeat_penalty: 1.1

    narration:
      temperature: 0.75
      max_tokens: 400
      repeat_penalty: 1.15

    decision:
      temperature: 0.5
      max_tokens: 200
      repeat_penalty: 1.1

    ghost:
      temperature: 0.4
      max_tokens: 150

embeddings:
  model: "nomic-embed-text"     # Run via llama.cpp or sentence-transformers
  base_url: "http://localhost:8080/v1"
  dimension: 768
